colors: false
no_tty: true
output: false

pre-commit:
  commands:
    format:
      glob: "*.{ts,tsx,jsx}"
      run: command -v paseo >/dev/null 2>&1 && paseo script start format || bunx biome format --write --colors=off --reporter=concise --no-errors-on-unmatched {staged_files}
      stage_fixed: true
