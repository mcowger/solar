<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fff9eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2b2030" media="(prefers-color-scheme: dark)" />
    <title>Solar</title>
    <link rel="manifest" href="./public/manifest.webmanifest" />
    <link rel="icon" href="./public/icons/solar-v2-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./public/icons/solar-v2-apple-touch-180.png" />
    <link rel="stylesheet" href="./src/app.css" />
    <script>const p=localStorage.getItem("solar-theme")||"system";document.documentElement.dataset.theme=p==="system"?(matchMedia("(prefers-color-scheme: dark)").matches?"solar-dark":"solar-light"):`solar-${p}`;</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
